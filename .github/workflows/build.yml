name: Build Formosaic

on:
  push:
    branches: [main]
    tags: ["v*", "release-*"]
  pull_request:

jobs:
  linux-release:
    name: Linux desktop (release)
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl unzip openjdk-21-jdk-headless ca-certificates \
            pkg-config libssl-dev build-essential cmake clang libclang-dev

      - name: Set up Android SDK/NDK
        run: cargo setup-android

      - name: Build desktop release
        env:
          POLY_PIZZA_API_KEY: ${{ secrets.POLY_PIZZA_API_KEY }}
        run: cargo build-desktop-release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop-release
          path: target/release/examples/desktop

  android-apk:
    name: Android APKs (debug + release)
    runs-on: ubuntu-latest
    container:
      image: rust:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            curl unzip openjdk-21-jdk-headless ca-certificates \
            pkg-config libssl-dev build-essential cmake clang libclang-dev

      - name: Set up Android SDK/NDK
        run: cargo setup-android

      - name: Restore release keystore
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
        run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > game/release.keystore

      - name: Build APK (debug)
        env:
          POLY_PIZZA_API_KEY: ${{ secrets.POLY_PIZZA_API_KEY }}
        run: cargo build-android

      - name: Build APK (release)
        env:
          POLY_PIZZA_API_KEY: ${{ secrets.POLY_PIZZA_API_KEY }}
        run: cargo build-android-release

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: |
            target/debug/apk/**/*.apk
            target/release/apk/**/*.apk
